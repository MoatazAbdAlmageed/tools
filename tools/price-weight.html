<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حاسبة الكيلو والنص والربع</title>
    <link rel="stylesheet" href="../theme.css" />
    <style>
      .field-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition:
          border-color 0.2s,
          transform 0.15s;
        margin-bottom: 4px;
      }
      .field-card:focus-within {
        border-color: var(--accent);
        transform: translateX(-3px);
      }
      .field-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
      }
      .field-icon.kilo {
        background: linear-gradient(135deg, #f5a623, #e8722a);
      }
      .field-icon.half {
        background: linear-gradient(135deg, #4facfe, #00c6fb);
      }
      .field-icon.quar {
        background: linear-gradient(135deg, #2dce89, #1ab76d);
      }
      .field-icon.eighth {
        background: linear-gradient(135deg, #a78bfa, #7c3aed);
      }
      .field-info {
        flex: 1;
      }
      .field-lbl {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 4px;
        cursor: pointer;
        transition: color 0.2s;
      }
      .field-lbl:hover {
        color: var(--accent);
        text-decoration: underline;
      }
      .field-input-row {
        display: flex;
        align-items: center;
      }
      .field-input-row input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: "Cairo", sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
      }
      .field-input-row input::placeholder {
        color: var(--border);
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <a href="../index.html" class="back-btn">← الرئيسية</a>

      <div class="page-header">
        <span class="page-icon">⚖️</span>
        <div class="page-title">حاسبة الكيلو</div>
        <div class="page-desc">اكتب في أي خانة وسيتم حساب الباقي تلقائياً</div>
      </div>

      <div class="card">
        <div class="divider">الأوزان</div>

        <div class="field-card">
          <div class="field-icon kilo">⚖️</div>
          <div class="field-info">
            <div class="field-lbl" onclick="copyText('1000gm')">الكيلو (1000 جرام)</div>
            <div class="field-input-row">
              <input type="text" id="kilo" placeholder="0" />
            </div>
          </div>
          <button class="copy-btn" onclick="copyVal('kilo')">📋</button>
        </div>

        <div class="divider">÷ 2</div>

        <div class="field-card">
          <div class="field-icon half">🔹</div>
          <div class="field-info">
            <div class="field-lbl" onclick="copyText('500')">نص كيلو (500 جرام)</div>
            <div class="field-input-row">
              <input type="text" id="half" placeholder="0" />
            </div>
          </div>
          <button class="copy-btn" onclick="copyVal('half')">📋</button>
        </div>

        <div class="divider">÷ 2</div>

        <div class="field-card">
          <div class="field-icon quar">🔸</div>
          <div class="field-info">
            <div class="field-lbl" onclick="copyText('250')">ربع كيلو (250 جرام)</div>
            <div class="field-input-row">
              <input type="text" id="quarter" placeholder="0" />
            </div>
          </div>
          <button class="copy-btn" onclick="copyVal('quarter')">📋</button>
        </div>

        <div class="divider">÷ 2</div>

        <div class="field-card">
          <div class="field-icon eighth">🔺</div>
          <div class="field-info">
            <div class="field-lbl" onclick="copyText('125')">تمن كيلو (125 جرام)</div>
            <div class="field-input-row">
              <input type="text" id="eighth" placeholder="0" />
            </div>
          </div>
          <button class="copy-btn" onclick="copyVal('eighth')">📋</button>
        </div>

        <div class="btn-row">
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ مسح</button>
          <button class="btn btn-primary" onclick="copyAll()">
            📋 نسخ الكل
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">✅ تم النسخ!</div>

    <script>
      const fields = {
        kilo: { el: document.getElementById("kilo"), mult: 1 },
        half: { el: document.getElementById("half"), mult: 0.5 },
        quarter: { el: document.getElementById("quarter"), mult: 0.25 },
        eighth: { el: document.getElementById("eighth"), mult: 0.125 },
      };

      function r(v) {
        return Math.round(v * 1000) / 1000;
      }

      function calculate(src) {
        const val = parseFloat(fields[src].el.value);
        if (isNaN(val) || val < 0) return;
        const kiloPrice = val / fields[src].mult;
        Object.entries(fields).forEach(([k, f]) => {
          if (k !== src) f.el.value = r(kiloPrice * f.mult);
        });
      }

      Object.keys(fields).forEach((k) => {
        fields[k].el.addEventListener("input", () => calculate(k));
      });

      function showToast(msg = "✅ تم النسخ!") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2000);
      }

      function copyText(txt) {
        navigator.clipboard.writeText(txt);
        showToast(`✅ تم نسخ ${txt}`);
      }

      function copyVal(key) {
        const v = fields[key].el.value;
        if (!v) return;
        navigator.clipboard.writeText(v);
        const names = { kilo: "الكيلو", half: "النص", quarter: "الربع", eighth: "التمن" };
        showToast(`✅ تم نسخ ${names[key]}`);
      }

      function copyAll() {
        const vals = Object.entries(fields)
          .map(([k, f]) => f.el.value)
          .filter(Boolean);
        if (!vals.length) return;
        const labels = { kilo: "الكيلو", half: "النص", quarter: "الربع", eighth: "التمن" };
        let text = "";
        Object.entries(fields).forEach(([k, f]) => {
          if (f.el.value) text += `${labels[k]}: ${f.el.value}\n`;
        });
        navigator.clipboard.writeText(text.trim());
        showToast("✅ تم نسخ جميع الأسعار!");
      }

      function clearAll() {
        Object.values(fields).forEach((f) => (f.el.value = ""));
      }
    </script>
  </body>
</html>
